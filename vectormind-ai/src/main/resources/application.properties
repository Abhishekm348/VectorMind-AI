server.port=8080

# Ollama configuration
ollama.host=http://localhost:11434
ollama.embed-model=nomic-embed-text
ollama.gen-model=llama3.2

# Demo vector dimensions
vectordb.demo-dims=16

# Chunking config
vectordb.chunk-words=250
vectordb.chunk-overlap=30

# Logging
logging.level.com.vectordb=INFO
spring.mvc.pathmatch.use-suffix-pattern=false
